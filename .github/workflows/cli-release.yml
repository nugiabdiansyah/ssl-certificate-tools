name: CLI Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish, for example v1.0.6'
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked
        working-directory: apps/cli

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ssl-tools
            asset: ssl-tools-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ssl-tools
            asset: ssl-tools-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ssl-tools
            asset: ssl-tools-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ssl-tools.exe
            asset: ssl-tools-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: apps/cli

      # Rename to the exact filename expected by the /cli download page
      - name: Stage binary
        shell: bash
        run: cp apps/cli/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish_crate:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        shell: bash
        working-directory: apps/cli
        run: |
          crate_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          test "v${crate_version}" = "${GITHUB_REF_NAME}"

      - name: Publish crate
        run: cargo publish --locked
        working-directory: apps/cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    if: ${{ always() && needs.build.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.publish_crate.result == 'success') }}
    needs: [build, publish_crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: 'artifacts/*'
          generate_release_notes: true
