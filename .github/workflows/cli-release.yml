name: CLI Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish, for example v0.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ssl-tools
            asset: ssl-tools-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ssl-tools
            asset: ssl-tools-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ssl-tools
            asset: ssl-tools-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ssl-tools.exe
            asset: ssl-tools-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: apps/cli

      # Rename to the exact filename expected by the /cli download page
      - name: Stage binary
        shell: bash
        run: cp apps/cli/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: 'artifacts/*'
          generate_release_notes: true
